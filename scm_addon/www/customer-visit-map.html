<!-- Customer Visit Map Page -->
<div id="customer-visit-map" style="width: 100%; height: 100vh;"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
    html, body, #customer-visit-map {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .leaflet-control {
        font-size: 13px;
    }

    .btn {
        display: inline-block;
        padding: 6px 12px;
        background-color: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        font-size: 12px;
    }

    .btn:hover {
        background-color: #0056b3;
    }

    .btn-sm {
        padding: 4px 8px;
        font-size: 11px;
    }

<script>
    // Initialize map when page loads
    $(document).ready(function() {
        if (typeof initCustomerVisitMap === 'function') {
            initCustomerVisitMap();
        }
    });
